<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTWIRE Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 350px; width: 100%; }
        h1 { font-size: 48px; margin-bottom: 5px; }
        h3 { color: #aaa; margin-bottom: 25px; font-weight: normal; }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            min-height: 40px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👻</h1>
        <h3>GHOSTWIRE Verification</h3>
        
        <button id="btn" onclick="verify()">🔐 Sign with Phantom</button>
        <div id="status">Tap to verify with Phantom</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function verify() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            
            // Generate message
            const message = `GHOSTWIRE_VERIFY_${Date.now()}`;
            const encodedMsg = encodeURIComponent(message);
            
            // Open Phantom to sign
            status.innerText = 'Opening Phantom...';
            window.location.href = `https://phantom.app/ul/v1/signMessage?message=${encodedMsg}&redirect=closed`;
            
            // After user signs and comes back, show instruction
            setTimeout(() => {
                status.innerHTML = `
                    ✅ After signing in Phantom:<br>
                    📋 Copy the signature<br>
                    📤 Come back and paste below
                `;
                
                // Show input for signature
                document.getElementById('btn').style.display = 'none';
                document.getElementById('container').innerHTML += `
                    <input type="text" id="sigInput" placeholder="Paste signature here..." 
                           style="width:100%;padding:14px;border-radius:10px;border:1px solid #444;
                                  background:#111133;color:white;font-size:14px;margin:10px 0;text-align:center;">
                    <input type="text" id="walletInput" placeholder="Your wallet address..." 
                           style="width:100%;padding:14px;border-radius:10px;border:1px solid #444;
                                  background:#111133;color:white;font-size:14px;margin:10px 0;text-align:center;">
                    <button onclick="submit()" style="background:#6c5ce7;color:white;border:none;
                            padding:16px;border-radius:14px;font-size:16px;width:100%;cursor:pointer;">
                        Submit
                    </button>
                `;
            }, 2000);
        }

        function submit() {
            const sig = document.getElementById('sigInput').value.trim();
            const wallet = document.getElementById('walletInput').value.trim();
            
            if (!sig || !wallet) {
                document.getElementById('status').innerText = '❌ Fill both fields';
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'verify_wallet',
                wallet: wallet,
                signature: sig,
                message: document.getElementById('status').dataset.message || ''
            }));
            
            document.getElementById('status').innerText = '✅ Submitted!';
            setTimeout(() => tg.close(), 600);
        }
    </script>
</body>
</html>

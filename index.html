<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTWIRE Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 350px; width: 100%; }
        h1 { font-size: 56px; margin-bottom: 5px; }
        h3 { color: #aaa; margin-bottom: 10px; font-weight: normal; }
        p { color: #777; font-size: 13px; margin-bottom: 30px; line-height: 1.5; }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #444; }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            min-height: 50px;
            padding: 10px;
            line-height: 1.5;
        }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👻</h1>
        <h3>GHOSTWIRE Verification</h3>
        <p>Connect Phantom to prove you hold GHOSTWIRE tokens</p>
        
        <button id="btn" onclick="verify()">Connect Phantom</button>
        <div id="status">Click to connect your wallet</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function verify() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerHTML = '⏳ Looking for Phantom...';
            status.className = '';
            
            // Check for Phantom
            const provider = window.phantom?.solana;
            
            if (!provider || !provider.isPhantom) {
                status.innerHTML = '❌ <b>Phantom not found!</b><br><small>Install Phantom wallet to verify.<br>Open this page in Telegram mobile.</small>';
                status.className = 'error';
                btn.disabled = false;
                return;
            }
            
            try {
                // Step 1: Connect
                status.innerHTML = '⏳ Connecting to Phantom...';
                const resp = await provider.connect();
                const wallet = resp.publicKey.toString();
                
                // Step 2: Sign message to prove ownership
                const message = `GHOSTWIRE_VERIFY_${Date.now()}`;
                const encodedMessage = new TextEncoder().encode(message);
                
                status.innerHTML = '⏳ Sign the message in Phantom...';
                
                const signedMessage = await provider.signMessage(encodedMessage, "utf8");
                const signature = Array.from(signedMessage.signature)
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');
                
                status.innerHTML = '✅ Verified! Sending to bot...';
                status.className = 'success';
                
                // Send to bot
                tg.sendData(JSON.stringify({
                    action: 'verify_wallet',
                    wallet: wallet,
                    signature: signature,
                    message: message
                }));
                
                setTimeout(() => tg.close(), 600);
                
            } catch (err) {
                console.error(err);
                status.innerHTML = '❌ <b>Verification failed</b><br><small>Please try again</small>';
                status.className = 'error';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTWIRE Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 350px; width: 100%; }
        h1 { font-size: 48px; margin-bottom: 5px; }
        h3 { color: #aaa; margin-bottom: 30px; font-weight: normal; font-size: 16px; }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #444; }
        .secondary { background: #333; }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            min-height: 40px;
            padding: 10px;
        }
        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111133;
            color: white;
            font-size: 14px;
            margin: 10px 0;
            text-align: center;
        }
        .wallet-box {
            background: #111133;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            word-break: break-all;
            font-size: 12px;
            color: #0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👻</h1>
        <h3>GHOSTWIRE Verification</h3>
        
        <button id="btn" onclick="connectPhantom()">Connect Phantom</button>
        <button class="secondary" onclick="showManual()">Paste Wallet Address</button>
        
        <div id="manualSection" style="display:none;">
            <input type="text" id="walletInput" placeholder="Your Solana wallet address...">
            <button onclick="submitManual()">Submit Wallet</button>
        </div>
        
        <div id="status">Click to connect your wallet</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function showManual() {
            document.getElementById('manualSection').style.display = 'block';
            document.getElementById('status').innerText = 'Paste your wallet address above';
        }

        function submitManual() {
            const wallet = document.getElementById('walletInput').value.trim();
            if (!wallet || wallet.length < 32) {
                document.getElementById('status').innerText = '❌ Invalid address!';
                return;
            }
            
            document.getElementById('status').innerText = '✅ Submitting...';
            
            tg.sendData(JSON.stringify({
                action: 'verify_wallet',
                wallet: wallet
            }));
            
            setTimeout(() => tg.close(), 800);
        }

        async function connectPhantom() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = '⏳ Looking for Phantom...';
            
            try {
                // Try multiple provider detection methods
                let provider = null;
                
                // Method 1: window.phantom
                if (window.phantom?.solana?.isPhantom) {
                    provider = window.phantom.solana;
                }
                // Method 2: window.solana
                else if (window.solana?.isPhantom) {
                    provider = window.solana;
                }
                // Method 3: window.solflare
                else if (window.solflare?.isSolflare) {
                    provider = window.solflare;
                }
                
                if (!provider) {
                    status.innerHTML = '⚠️ Phantom not detected!<br><small>Use "Paste Wallet Address" instead</small>';
                    btn.disabled = false;
                    showManual();
                    return;
                }
                
                status.innerText = '⏳ Connecting...';
                const resp = await provider.connect();
                const wallet = resp.publicKey.toString();
                
                status.innerHTML = '✅ Connected!<br><small>' + wallet + '</small>';
                
                // Send wallet to bot
                tg.sendData(JSON.stringify({
                    action: 'verify_wallet',
                    wallet: wallet
                }));
                
                setTimeout(() => tg.close(), 800);
                
            } catch (err) {
                console.error(err);
                status.innerHTML = '❌ Connection failed!<br><small>Use "Paste Wallet Address" instead</small>';
                btn.disabled = false;
                showManual();
            }
        }
    </script>
</body>
</html>

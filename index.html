<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTWIRE Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 350px; width: 100%; }
        h1 { font-size: 48px; }
        h3 { color: #aaa; margin: 10px 0 25px; font-weight: normal; }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        button:disabled { background: #444; }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👻</h1>
        <h3>Verify GHOSTWIRE</h3>
        
        <button id="btn" onclick="verify()">Connect Phantom</button>
        <div id="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function verify() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            const provider = window.phantom?.solana;
            
            if (!provider?.isPhantom) {
                status.innerText = '❌ Install Phantom wallet';
                return;
            }
            
            try {
                btn.disabled = true;
                status.innerText = 'Connecting...';
                
                const resp = await provider.connect();
                const wallet = resp.publicKey.toString();
                
                status.innerText = '✅ Connected!';
                
                tg.sendData(JSON.stringify({
                    action: 'verify_wallet',
                    wallet: wallet
                }));
                
                setTimeout(() => tg.close(), 500);
                
            } catch (e) {
                status.innerText = '❌ Try again';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

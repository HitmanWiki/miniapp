<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTWIRE Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 350px; width: 100%; }
        h1 { font-size: 56px; margin-bottom: 5px; }
        h3 { color: #aaa; margin-bottom: 10px; font-weight: normal; }
        p { color: #777; font-size: 13px; margin-bottom: 30px; }
        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #444; }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            min-height: 50px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👻</h1>
        <h3>GHOSTWIRE Verification</h3>
        <p>Connect Phantom to verify ownership</p>
        
        <button id="btn" onclick="verify()">Connect Phantom</button>
        <div id="status">Click to connect</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function verify() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = '⏳ Looking for Phantom...';
            
            const provider = window.phantom?.solana;
            
            if (!provider || !provider.isPhantom) {
                status.innerHTML = '❌ Phantom not found!<br><small>Install Phantom and open in Telegram</small>';
                btn.disabled = false;
                return;
            }
            
            try {
                status.innerText = '⏳ Connecting...';
                const resp = await provider.connect();
                const wallet = resp.publicKey.toString();
                
                const message = `GHOSTWIRE_VERIFY_${Date.now()}`;
                const encodedMessage = new TextEncoder().encode(message);
                
                status.innerText = '✍️ Sign message in Phantom...';
                
                const signedMessage = await provider.signMessage(encodedMessage, "utf8");
                
                // Use bs58 encoding for Solana compatibility
                const signature = bs58.encode(signedMessage.signature);
                
                status.innerText = '✅ Verified!';
                
                tg.sendData(JSON.stringify({
                    action: 'verify_wallet',
                    wallet: wallet,
                    signature: signature,
                    message: message
                }));
                
                setTimeout(() => tg.close(), 600);
                
            } catch (err) {
                console.error(err);
                status.innerText = '❌ Failed! Try again.';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
